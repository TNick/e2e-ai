name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        # Include the optional monitor extra so the monitor web tests run in CI
        # (they are skipped automatically when the extra is not installed).
        run: python -m pip install -e ".[dev,monitor]"

      - name: Ruff check
        run: python -m ruff check src tests

      - name: Pytest
        run: python -m pytest -q
