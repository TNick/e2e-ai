<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>e2e-ai monitor</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2f3a; --text: #d7dbe3;
    --muted: #8b93a3; --accent: #4c8bf5; --ok: #3fb27f; --fail: #e5534b;
    --warn: #d9a441; --run: #4c8bf5;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.45 system-ui, sans-serif; background: var(--bg); color: var(--text); }
  a { color: var(--accent); text-decoration: none; }
  .app { display: grid; grid-template-columns: auto 1fr; grid-template-rows: 44px 1fr; height: 100vh; }
  .bar { grid-column: 1 / 3; display: flex; align-items: center; gap: 12px; padding: 0 12px;
         background: var(--panel); border-bottom: 1px solid var(--border); }
  .bar .title { font-weight: 600; }
  .bar .spacer { flex: 1; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .side { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto;
          width: 190px; transition: width .12s; }
  .side.collapsed { width: 46px; }
  .side nav a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; color: var(--text);
                border-left: 3px solid transparent; cursor: pointer; }
  .side nav a.active { border-left-color: var(--accent); background: #1e222b; }
  .side.collapsed .label { display: none; }
  .ico { width: 18px; text-align: center; }
  main { overflow: auto; padding: 14px; }
  h2 { margin: 0 0 10px; font-size: 15px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--bg); }
  tr:hover td { background: #14171e; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .pill { padding: 1px 7px; border-radius: 10px; font-size: 11px; border: 1px solid var(--border); }
  .s-passed, .s-passing, .s-exited0, .s-ok { color: var(--ok); }
  .s-failed, .s-failing, .s-failed_to_start, .s-error { color: var(--fail); }
  .s-running, .s-blocked, .s-interrupted { color: var(--run); }
  .muted { color: var(--muted); }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 4px; padding: 6px 12px; cursor: pointer; }
  button.secondary { background: #2a2f3a; }
  button:disabled { opacity: .5; cursor: default; }
  input, select { background: #10131a; color: var(--text); border: 1px solid var(--border);
                  border-radius: 4px; padding: 5px 7px; width: 100%; }
  label.field { display: block; margin: 8px 0; }
  label.field .k { color: var(--muted); font-size: 12px; }
  pre { background: #0b0d12; border: 1px solid var(--border); border-radius: 4px; padding: 10px;
        overflow: auto; max-height: 340px; white-space: pre-wrap; word-break: break-word; }
  .row-flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .destructive { color: var(--warn); }
  .copy { cursor: pointer; color: var(--muted); }
  .info-btn { display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; font-style: italic; font-size: 12px;
    user-select: none; transition: transform .2s ease, color .2s ease; }
  .info-btn:hover { color: var(--accent); }
  .info-btn.rotated { transform: rotate(15deg); color: var(--accent); }
  .page-head { margin-bottom: 18px; }
  .page-desc { max-height: 0; overflow: hidden; opacity: 0; margin: 0;
    transition: max-height .28s ease, opacity .28s ease, margin .28s ease; }
  .page-desc.open { max-height: 900px; opacity: 1; margin: 10px 0 0; }
  .page-desc .card { margin-bottom: 0; }
  .page-desc dt { color: var(--text); font-weight: 600; margin-top: 6px; }
  .page-desc dd { color: var(--muted); margin: 0 0 2px 0; }
  .page-desc .val { color: var(--accent); }
  .cfg { font-family: ui-monospace, monospace; font-size: 12px; }
  .cfg .ckey { color: var(--muted); }
  .cfg .cval { color: var(--text); }
  .cfg .node { margin-left: 12px; border-left: 1px solid var(--border); padding-left: 8px; }
  .codex-log { display: flex; flex-direction: column; gap: 8px; }
  .codex-preamble { color: var(--muted); font-size: 12px; white-space: pre-wrap; }
  .codex-meta { font-size: 12px; color: var(--muted); padding: 4px 0; }
  .codex-item { margin: 0; padding: 10px; }
  .codex-item-head { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .codex-item-head .id { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
  .codex-cmd { font-family: ui-monospace, monospace; font-size: 11px;
    background: #0b0d12; border: 1px solid var(--border); border-radius: 4px;
    padding: 8px; white-space: pre-wrap; word-break: break-word; max-height: 160px; overflow: auto; }
  .codex-out { margin-top: 8px; }
  .codex-out summary { cursor: pointer; color: var(--muted); font-size: 12px; user-select: none; }
  .codex-out pre { margin-top: 6px; max-height: 420px; }
  .codex-field { margin: 6px 0; }
  .codex-label { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .03em; margin-bottom: 2px; }
  .codex-field ul { margin: 4px 0 0 18px; padding: 0; }
  .codex-field li { margin: 2px 0; }
  .codex-msg { white-space: pre-wrap; word-break: break-word; }
  .cursor-think { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <span class="ico" style="cursor:pointer" id="toggle">☰</span>
    <span class="title">e2e-ai monitor</span>
    <span class="muted" id="project">—</span>
    <span class="spacer"></span>
    <span class="muted" id="dbpath"></span>
    <span class="dot" id="conn" title="connection"></span>
  </div>
  <aside class="side" id="side">
    <nav id="nav"></nav>
  </aside>
  <main id="view"></main>
</div>
<script>
const NAV = [
  ["active", "Active", "▶"], ["commands", "Commands", "⚙"], ["runs", "Runs", "≡"],
  ["tests", "Tests", "✓"], ["failures", "Failures", "✗"], ["agents", "Agents", "◆"],
  ["settings", "Settings", "…"],
];
const state = { view: "active", info: null, schemas: [], sel: null, rev: "",
                sort: {}, filter: {}, drawerRender: null,
                descOpen: {}, settingsFull: false,
                logFormatSticky: {}, agentDrawerPolling: null };
let agentDrawGen = 0;
let commandDrawGen = 0;

async function api(path, opts) {
  const r = await fetch("/api" + path, opts);
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.status);
  return r.json();
}
const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const local = (t) => t ? `<span title="${esc(t)}">${new Date(t).toLocaleString()}</span>` : "—";
const scls = (s) => "s-" + String(s ?? "").toLowerCase();

// Expand literal escape sequences still embedded in display text.
function normalizeDisplayText(text) {
  if (text == null || text === "") return "";
  return String(text)
    .replace(/\\r\\n/g, "\n")
    .replace(/\\n/g, "\n")
    .replace(/\\r/g, "\n")
    .replace(/\r\n/g, "\n")
    .replace(/\r/g, "\n");
}

// Detect Codex ``codex exec --json`` JSONL streams in agent stdout.
function isCodexJsonl(text) {
  const lines = String(text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
  if (lines.length < 2) return false;
  let hits = 0;
  for (const line of lines) {
    if (!line.startsWith("{")) continue;
    try {
      const obj = JSON.parse(line);
      const t = obj && obj.type;
      if (typeof t === "string" && /^(thread|turn|item)\./.test(t)) hits++;
    } catch { /* not JSON */ }
  }
  return hits >= 2;
}

function parseJsonlStream(text) {
  const preamble = [];
  const events = [];
  for (const raw of String(text || "").split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) continue;
    if (!line.startsWith("{")) {
      preamble.push(line);
      continue;
    }
    try {
      events.push(JSON.parse(line));
    } catch {
      preamble.push(line);
    }
  }
  return { preamble, events };
}

function parseCodexStream(text) {
  return parseJsonlStream(text);
}

// Detect Cursor Agent CLI ``--output-format stream-json`` logs.
function isCursorStreamJsonl(text) {
  const lines = String(text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
  if (!lines.length) return false;
  let hits = 0;
  for (const line of lines) {
    if (!line.startsWith("{")) continue;
    try {
      const obj = JSON.parse(line);
      const t = obj && obj.type;
      if (t === "tool_call" || t === "thinking") hits += 2;
      else if (t === "system" && obj.subtype === "init") hits++;
      else if (t === "assistant" || t === "result" || t === "interaction_query") hits++;
    } catch { /* not JSON */ }
  }
  return hits >= 2;
}

function resolveAgentLogFormat(text, agentId, stickyKey) {
  const raw = String(text || "");
  if (!raw.trim()) return { fmt: null, forced: false };
  const id = String(agentId || "");
  if (/^codex/i.test(id)) return { fmt: "codex", forced: true };
  if (/^cursor/i.test(id)) return { fmt: "cursor", forced: true };
  if (isCodexJsonl(raw)) {
    if (stickyKey) state.logFormatSticky[stickyKey] = "codex";
    return { fmt: "codex", forced: false };
  }
  if (isCursorStreamJsonl(raw)) {
    if (stickyKey) state.logFormatSticky[stickyKey] = "cursor";
    return { fmt: "cursor", forced: false };
  }
  if (stickyKey && state.logFormatSticky[stickyKey]) {
    return { fmt: state.logFormatSticky[stickyKey], forced: true };
  }
  return { fmt: null, forced: false };
}

function renderJsonlStreamingPlaceholder(preamble, fullText) {
  const buf = preamble.length
    ? normalizeDisplayText(preamble.join("\n"))
    : normalizeDisplayText(fullText);
  const parts = ['<div class="codex-log"><div class="codex-meta">Streaming…</div>'];
  if (buf.trim()) {
    parts.push(renderCursorCollapsiblePre(
      `Buffer (${buf.length.toLocaleString()} chars)`,
      buf,
      0,
    ));
  }
  parts.push("</div>");
  return parts.join("");
}

function extractCursorMessageText(message) {
  if (!message || typeof message !== "object") return "";
  const content = message.content;
  if (!Array.isArray(content)) return "";
  return content
    .filter((part) => part && part.type === "text" && part.text)
    .map((part) => part.text)
    .join("");
}

function cursorToolCallEntry(toolCall) {
  if (!toolCall || typeof toolCall !== "object") return null;
  const keys = Object.keys(toolCall);
  if (!keys.length) return null;
  const name = keys[0];
  return [name, toolCall[name] || {}];
}

function cursorToolCallTitle(toolCall) {
  const entry = cursorToolCallEntry(toolCall);
  if (!entry) return "tool";
  const [name, payload] = entry;
  const args = payload.args || {};
  if (name === "readToolCall") {
    const path = args.path || "—";
    const range = args.offset != null ? ` @${args.offset}` : "";
    return `Read ${path}${range}`;
  }
  if (name === "grepToolCall") {
    return `Grep ${args.pattern || "—"} in ${args.path || "—"}`;
  }
  if (name === "createPlanToolCall") {
    return `Plan: ${args.name || args.overview || "create plan"}`;
  }
  return name.replace(/ToolCall$/, "");
}

function renderCursorCollapsiblePre(label, text, openThreshold) {
  const norm = normalizeDisplayText(text);
  if (!norm) return "";
  const open = norm.length < (openThreshold || 2400) ? " open" : "";
  return `<details class="codex-out"${open}><summary>${esc(label)}</summary>`
    + `<pre>${esc(norm)}</pre></details>`;
}

function renderCursorToolCallBody(toolCall, completedEv) {
  const entry = cursorToolCallEntry(toolCall);
  if (!entry) return '<div class="muted">(no tool details)</div>';
  const [name, startedPayload] = entry;
  const completedPayload = completedEv && cursorToolCallEntry(completedEv.tool_call);
  const result = completedPayload && completedPayload[0] === name
    ? completedPayload[1].result
    : null;

  if (name === "readToolCall") {
    const success = result && result.success;
    const content = success && success.content;
    if (content) {
      const label = `Content (${String(content).length.toLocaleString()} chars`
        + `${success.totalLines != null ? `, ${success.totalLines} lines` : ""})`;
      return renderCursorCollapsiblePre(label, content, 1200);
    }
    const path = (startedPayload.args || {}).path;
    return path ? `<div class="codex-cmd">${esc(path)}</div>` : '<div class="muted">Reading…</div>';
  }

  if (name === "grepToolCall") {
    const args = startedPayload.args || {};
    let body = `<div class="codex-cmd">${esc(args.pattern || "—")} · ${esc(args.path || "—")}</div>`;
    const matches = result && result.success
      && result.success.workspaceResults;
    if (matches && typeof matches === "object") {
      const lines = [];
      for (const ws of Object.values(matches)) {
        const content = ws && ws.content;
        if (!content || !Array.isArray(content.matches)) continue;
        for (const match of content.matches.slice(0, 12)) {
          const file = match.file || "—";
          const hit = (match.matches || [])[0];
          const lineNo = hit && hit.lineNumber != null ? hit.lineNumber : "?";
          lines.push(`${file}:${lineNo}`);
        }
      }
      if (lines.length) {
        body += `<ul>${lines.map((line) => `<li>${esc(line)}</li>`).join("")}</ul>`;
      }
    }
    return body;
  }

  if (name === "createPlanToolCall") {
    const args = startedPayload.args || {};
    const plan = args.plan || "";
    let body = "";
    if (args.overview) body += `<div class="codex-msg">${esc(normalizeDisplayText(args.overview))}</div>`;
    if (plan) {
      body += renderCursorCollapsiblePre(
        `Plan (${String(plan).length.toLocaleString()} chars)`,
        plan,
        1800,
      );
    }
    return body || '<div class="muted">(empty plan)</div>';
  }

  const dump = normalizeDisplayText(JSON.stringify(startedPayload.args || {}, null, 2));
  return dump ? `<pre>${esc(dump)}</pre>` : '<div class="muted">(no args)</div>';
}

function renderCursorToolCallCard(rec) {
  const evs = rec.evs || [];
  const started = evs.find((ev) => ev.subtype === "started");
  const completed = evs.find((ev) => ev.subtype === "completed");
  const toolCall = (started || completed || {}).tool_call || {};
  const title = cursorToolCallTitle(toolCall);
  const status = completed ? "completed" : started ? "in_progress" : "pending";
  const statusCls = status === "completed" ? "s-ok" : status === "in_progress" ? "s-running" : "muted";
  return `<div class="card codex-item">
    <div class="codex-item-head">
      <span class="pill">tool</span>
      <span class="id">${esc(title)}</span>
      <span class="pill ${statusCls}">${esc(status)}</span>
    </div>
    ${renderCursorToolCallBody(toolCall, completed)}
  </div>`;
}

function buildCursorDisplayUnits(events) {
  const units = [];
  const toolCallsById = new Map();
  let thinkingBuf = [];

  function flushThinking() {
    const text = thinkingBuf.join("");
    thinkingBuf = [];
    if (text.trim()) units.push({ kind: "thinking", text });
  }

  for (const ev of events) {
    const t = ev && ev.type;
    const st = ev.subtype;

    if (t === "thinking") {
      if (st === "delta") thinkingBuf.push(ev.text || "");
      else if (st === "completed") flushThinking();
      continue;
    }

    if (t === "tool_call") {
      flushThinking();
      const id = ev.call_id || ev.toolCallId || `tc-${toolCallsById.size}`;
      if (!toolCallsById.has(id)) {
        toolCallsById.set(id, { id, evs: [] });
        units.push({ kind: "tool_call", id });
      }
      toolCallsById.get(id).evs.push(ev);
      continue;
    }

    if (t === "interaction_query") {
      if (st === "request" && ev.query && ev.query.createPlanRequestQuery) {
        units.push({ kind: "meta", text: "Create plan request" });
      }
      continue;
    }

    flushThinking();
    if (t === "system" || t === "user" || t === "assistant" || t === "result") {
      units.push({ kind: t, ev });
    }
  }
  flushThinking();
  return { units, toolCallsById };
}

function renderCursorLog(text, opts = {}) {
  const { preamble, events } = parseJsonlStream(text);
  if (!events.length) {
    if (opts.forced) return renderJsonlStreamingPlaceholder(preamble, text);
    return `<pre>${esc(normalizeDisplayText(text))}</pre>`;
  }
  const { units, toolCallsById } = buildCursorDisplayUnits(events);
  const parts = ['<div class="codex-log">'];
  if (preamble.length) {
    parts.push(`<div class="codex-preamble">${esc(normalizeDisplayText(preamble.join("\n")))}</div>`);
  }
  for (const unit of units) {
    if (unit.kind === "meta") {
      parts.push(`<div class="codex-meta">${esc(unit.text)}</div>`);
      continue;
    }
    if (unit.kind === "thinking") {
      const norm = normalizeDisplayText(unit.text);
      parts.push(`<div class="card codex-item"><details class="codex-out">`
        + `<summary>${esc(`Thinking (${norm.length.toLocaleString()} chars)`)}</summary>`
        + `<pre class="cursor-think">${esc(norm)}</pre></details></div>`);
      continue;
    }
    if (unit.kind === "tool_call") {
      parts.push(renderCursorToolCallCard(toolCallsById.get(unit.id) || { evs: [] }));
      continue;
    }
    const ev = unit.ev || {};
    if (unit.kind === "system" && ev.subtype === "init") {
      parts.push(`<div class="codex-meta">Session · ${esc(ev.model || "?")} · ${esc(ev.cwd || "—")}</div>`);
      continue;
    }
    if (unit.kind === "user") {
      const msg = normalizeDisplayText(extractCursorMessageText(ev.message));
      parts.push(`<div class="card codex-item"><div class="codex-item-head"><span class="pill">user</span></div>`
        + renderCursorCollapsiblePre(`Prompt (${msg.length.toLocaleString()} chars)`, msg, 0)
        + `</div>`);
      continue;
    }
    if (unit.kind === "assistant") {
      const msg = normalizeDisplayText(extractCursorMessageText(ev.message));
      parts.push(`<div class="card codex-item"><div class="codex-item-head"><span class="pill">assistant</span></div>`
        + (msg ? `<div class="codex-msg">${esc(msg)}</div>` : '<div class="muted">(empty)</div>')
        + `</div>`);
      continue;
    }
    if (unit.kind === "result") {
      const msg = normalizeDisplayText(ev.result || "");
      const usage = ev.usage && typeof ev.usage === "object" ? ev.usage : null;
      const usageTxt = usage
        ? ` · in/out ${usage.inputTokens ?? "—"}/${usage.outputTokens ?? "—"}`
        : "";
      const okCls = ev.is_error ? "s-failed" : "s-ok";
      parts.push(`<div class="card codex-item"><div class="codex-item-head">`
        + `<span class="pill">result</span><span class="pill ${okCls}">${esc(ev.subtype || "—")}</span>`
        + `<span class="muted">${esc(usageTxt)}</span></div>`
        + (msg ? `<div class="codex-msg">${esc(msg)}</div>` : "")
        + `</div>`);
      continue;
    }
  }
  parts.push("</div>");
  return parts.join("");
}

function codexItemRecords(events) {
  const order = [];
  const byId = new Map();
  const meta = [];
  for (const ev of events) {
    const t = ev && ev.type;
    if (typeof t !== "string" || !t.startsWith("item.")) {
      meta.push(ev);
      continue;
    }
    const item = ev.item || {};
    const id = item.id || `item-${order.length}`;
    if (!byId.has(id)) {
      byId.set(id, { id, item: { ...item } });
      order.push(id);
    } else {
      Object.assign(byId.get(id).item, item);
    }
    const rec = byId.get(id);
    if (t === "item.started") rec.started = true;
    if (t === "item.completed") rec.completed = true;
  }
  return { meta, items: order.map((id) => byId.get(id)) };
}

function renderCodexPlanFields(obj) {
  const sections = [
    ["Summary", obj.summary],
    ["Root cause", obj.root_cause_hypothesis],
    ["Files to inspect", obj.files_to_inspect],
    ["Files to change", obj.files_to_change],
    ["Steps", obj.steps],
    ["Risks", obj.risks],
    ["Verification", obj.verification_commands],
    ["Blockers", obj.external_blocker_signals],
  ];
  const html = sections.map(([label, value]) => {
    if (value == null) return "";
    if (Array.isArray(value)) {
      if (!value.length) return "";
      return `<div class="codex-field"><div class="codex-label">${esc(label)}</div><ul>${
        value.map((entry) => `<li>${esc(typeof entry === "string" ? entry : JSON.stringify(entry))}</li>`).join("")
      }</ul></div>`;
    }
    const text = String(value).trim();
    if (!text) return "";
    return `<div class="codex-field"><div class="codex-label">${esc(label)}</div>`
      + `<div class="codex-msg">${esc(normalizeDisplayText(text))}</div></div>`;
  }).filter(Boolean).join("");
  return html || `<pre>${esc(normalizeDisplayText(JSON.stringify(obj, null, 2)))}</pre>`;
}

function renderCodexItemBody(item) {
  const type = item.type || "item";
  if (type === "agent_message") {
    const text = normalizeDisplayText(item.text || "");
    if (!text) return '<div class="muted">(empty message)</div>';
    try {
      const parsed = JSON.parse(text);
      if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
        return renderCodexPlanFields(parsed);
      }
    } catch { /* plain text */ }
    return `<div class="codex-msg">${esc(text)}</div>`;
  }
  if (type === "command_execution") {
    const cmd = normalizeDisplayText(item.command || "");
    const out = normalizeDisplayText(item.aggregated_output || "");
    const status = item.status || (item.exit_code == null ? "in_progress" : "completed");
    let body = "";
    if (cmd) body += `<div class="codex-cmd">${esc(cmd)}</div>`;
    if (out) {
      const label = `Output (${out.length.toLocaleString()} chars`
        + `${item.exit_code != null ? `, exit ${item.exit_code}` : ""})`;
      body += `<details class="codex-out"${out.length < 2400 ? " open" : ""}>`
        + `<summary>${esc(label)}</summary><pre>${esc(out)}</pre></details>`;
    } else if (status === "in_progress") {
      body += '<div class="muted">Running…</div>';
    }
    return body || '<div class="muted">(no command output)</div>';
  }
  const dump = normalizeDisplayText(JSON.stringify(item, null, 2));
  return `<pre>${esc(dump)}</pre>`;
}

function renderCodexItemCard(rec) {
  const item = rec.item || {};
  const type = item.type || "item";
  const status = item.status
    || (rec.completed ? "completed" : rec.started ? "in_progress" : "pending");
  const statusCls = status === "completed" && item.exit_code === 0 ? "s-ok"
    : status === "completed" && item.exit_code != null && item.exit_code !== 0 ? "s-failed"
    : status === "failed" ? "s-failed"
    : status === "in_progress" ? "s-running"
    : "muted";
  return `<div class="card codex-item">
    <div class="codex-item-head">
      <span class="pill">${esc(type)}</span>
      <span class="id">${esc(rec.id)}</span>
      <span class="pill ${statusCls}">${esc(status)}</span>
      ${item.exit_code != null ? `<span class="muted">exit ${esc(item.exit_code)}</span>` : ""}
    </div>
    ${renderCodexItemBody(item)}
  </div>`;
}

function renderCodexMetaEvent(ev) {
  const t = ev.type || "event";
  if (t === "thread.started") {
    return `<div class="codex-meta">Thread started · ${esc(ev.thread_id || "—")}</div>`;
  }
  if (t === "turn.started") return '<div class="codex-meta">Turn started</div>';
  if (t === "turn.completed") {
    const usage = ev.usage && typeof ev.usage === "object"
      ? ` · tokens in/out: ${esc(ev.usage.input_tokens ?? "—")}/${esc(ev.usage.output_tokens ?? "—")}`
      : "";
    return `<div class="codex-meta">Turn completed${usage}</div>`;
  }
  return `<div class="codex-meta">${esc(t)}</div>`;
}

function renderCodexLog(text, opts = {}) {
  const { preamble, events } = parseCodexStream(text);
  if (!events.length) {
    if (opts.forced) return renderJsonlStreamingPlaceholder(preamble, text);
    return `<pre>${esc(normalizeDisplayText(text))}</pre>`;
  }
  const { meta, items } = codexItemRecords(events);
  const parts = ['<div class="codex-log">'];
  if (preamble.length) {
    parts.push(`<div class="codex-preamble">${esc(normalizeDisplayText(preamble.join("\n")))}</div>`);
  }
  for (const ev of meta) parts.push(renderCodexMetaEvent(ev));
  for (const rec of items) parts.push(renderCodexItemCard(rec));
  parts.push("</div>");
  return parts.join("");
}

function renderAgentLog(text, agentId, stickyKey) {
  const raw = String(text || "");
  if (!raw.trim()) return "";
  const { fmt, forced } = resolveAgentLogFormat(raw, agentId, stickyKey);
  if (fmt === "codex") return renderCodexLog(raw, { forced });
  if (fmt === "cursor") return renderCursorLog(raw, { forced });
  return `<pre>${esc(normalizeDisplayText(raw))}</pre>`;
}

// Compare two cell values by column type. Dates/date-times compare by their
// underlying value (parsed timestamp), never by the displayed string.
function cmp(a, b, type) {
  if (type === "date") {
    const av = a ? Date.parse(a) : 0, bv = b ? Date.parse(b) : 0;
    return (Number.isNaN(av) ? 0 : av) - (Number.isNaN(bv) ? 0 : bv);
  }
  if (type === "num") {
    const av = a == null || a === "" ? -Infinity : Number(a);
    const bv = b == null || b === "" ? -Infinity : Number(b);
    return av - bv;
  }
  return String(a ?? "").toLowerCase().localeCompare(String(b ?? "").toLowerCase());
}

// Render a sortable (and optionally status-filterable) table.
//   columns: [{ label, type: 'date'|'num'|'str', val(row), cell(row)?, cls(row)? }]
//   opts.filter: { label, val(row) } adds a dropdown that filters by that value.
// Sort/filter state is kept in `state` keyed by `id`, so silent auto-refreshes
// and re-renders preserve the user's choice.
function renderTable(id, columns, rows, opts = {}) {
  const st = state.sort[id];
  const fval = state.filter[id] || "__all__";
  let data = rows.slice();
  let filterBar = "";
  if (opts.filter) {
    const values = [...new Set(rows.map((r) => String(opts.filter.val(r) ?? "")))]
      .filter(Boolean).sort();
    if (fval !== "__all__") data = data.filter((r) => String(opts.filter.val(r) ?? "") === fval);
    filterBar = `<div class="row-flex" style="margin-bottom:6px">
      <span class="muted">${esc(opts.filter.label)}:</span>
      <select data-filter="${id}" style="width:auto">
        <option value="__all__"${fval === "__all__" ? " selected" : ""}>all</option>
        ${values.map((v) => `<option value="${esc(v)}"${fval === v ? " selected" : ""}>${esc(v)}</option>`).join("")}
      </select>
      <span class="muted">${data.length} / ${rows.length}</span></div>`;
  }
  if (st) {
    const col = columns[st.i];
    if (col) data.sort((a, b) => cmp(col.val(a), col.val(b), col.type) * (st.dir === "desc" ? -1 : 1));
  }
  const head = columns.map((c, i) => {
    const arrow = st && st.i === i ? (st.dir === "desc" ? " ▼" : " ▲") : "";
    return `<th data-sort="${id}:${i}" style="cursor:pointer" title="Sort">${esc(c.label)}${arrow}</th>`;
  }).join("");
  const body = data.map((r) => `<tr>${columns.map((c) =>
    `<td class="${c.cls ? c.cls(r) : ""}">${c.cell ? c.cell(r) : esc(c.val(r) ?? "")}</td>`).join("")}</tr>`).join("");
  return filterBar + `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}

// A page title with an ⓘ info button that reveals a description (transition).
// Open/closed state persists per view so live refreshes don't collapse it.
function pageHeader(id, title, descHtml) {
  const open = !!state.descOpen[id];
  return `<div class="page-head">
      <div class="row-flex" style="gap:8px">
        <h2 style="margin:0">${esc(title)}</h2>
        <span class="info-btn${open ? " rotated" : ""}" data-info="${id}"
              title="About this page">i</span>
      </div>
      <div class="page-desc${open ? " open" : ""}" id="desc-${id}">
        <div class="card">${descHtml}</div>
      </div>
    </div>`;
}

// Recursively render a config object as a readable key/value tree.
function renderConfig(obj) {
  if (obj === null || obj === undefined) return '<span class="cval">null</span>';
  if (Array.isArray(obj)) {
    if (!obj.length) return '<span class="cval">[]</span>';
    return `<div class="node">${obj.map((v) =>
      `<div>- ${renderConfig(v)}</div>`).join("")}</div>`;
  }
  if (typeof obj === "object") {
    return `<div class="node">${Object.entries(obj).map(([k, v]) =>
      `<div><span class="ckey">${esc(k)}</span>: ${
        v !== null && typeof v === "object"
          ? renderConfig(v)
          : `<span class="cval">${esc(String(v))}</span>`
      }</div>`).join("")}</div>`;
  }
  return `<span class="cval">${esc(String(obj))}</span>`;
}

function renderNav() {
  document.getElementById("nav").innerHTML = NAV.map(([id, label, ico]) =>
    `<a data-v="${id}" class="${state.view === id ? "active" : ""}">
       <span class="ico">${ico}</span><span class="label">${label}</span></a>`).join("");
  document.querySelectorAll("#nav a").forEach((a) => {
    a.setAttribute("href", "#" + a.dataset.v);
    a.onclick = (e) => { e.preventDefault(); navigate(a.dataset.v); };
  });
}

// Hash routing: the URL (#active, #runs, …) reflects the current page, so the
// address bar updates and browser back/forward + deep links work.
function navigate(view) {
  if (!VIEWS[view]) return;
  dismissDrawer();
  if (location.hash.slice(1) === view) {
    state.view = view;
    render();
    return;
  }
  location.hash = view;  // triggers the hashchange handler below
}
function viewFromHash() {
  const v = decodeURIComponent(location.hash.slice(1));
  return VIEWS[v] ? v : "active";
}
window.addEventListener("hashchange", () => {
  const v = viewFromHash();
  if (v !== state.view) {
    dismissDrawer();
    state.view = v;
    render();
  }
});

  if (running.items.length) {
    runningHtml = `<h2 style="margin-top:14px">Running agents</h2>
      ${running.items.map((a) => `<div class="card">
        <div class="row-flex"><b>${esc(a.role)}</b>
          <span class="pill">${esc(a.agent_id)}</span>
          <span class="spacer"></span>
          <span class="${scls(a.status)}">${esc(a.status)}</span></div>
        <div>${a.test_title
          ? `<a data-test="${esc(a.test_id)}">${esc(a.test_title)}</a>`
          : '<span class="muted">—</span>'}</div>
        <div class="muted">started ${local(a.started_at)} ·

}
const card = (k, v) => `<div class="card"><div class="muted">${k}</div><div style="font-size:22px">${v ?? 0}</div></div>`;
function shardCard(s) {
  const a = s.attempts[0] || {};
  const urls = [s.frontend_url && link(s.frontend_url), s.backend_url && link(s.backend_url)].filter(Boolean).join(" ");
  return `<div class="card">
    <div class="row-flex"><b>${esc(s.label)}</b>
      <span class="pill">${esc(s.database_name || "no-db")}</span>
      <span class="spacer"></span>${urls}</div>
    <div>${esc(a.title || "—")} <span class="muted">${esc(a.spec_file || "")}</span></div>
    <div class="muted">attempt ${esc(a.attempt_index)} · started ${local(a.started_at)} · ${s.attempts.length} attempt(s)</div>
  </div>`;
}
const link = (u) => `<a href="${esc(u)}" target="_blank">${esc(u)}</a>`;
const runSummary = (x) => {
  const runs = Number(x.run_count ?? 0);
  const failures = Number(x.failure_count ?? 0);
  if (!runs) return "0";
  return failures ? `${runs} (${failures})` : String(runs);
};

  const table = renderTable("agents", [
    { label: "Started", type: "date", val: (x) => x.started_at, cell: (x) => local(x.started_at) },
    { label: "Finished", type: "date", val: (x) => x.finished_at,
      cell: (x) => x.finished_at ? local(x.finished_at) : '<span class="muted">—</span>' },
    { label: "Role", type: "str", val: (x) => x.role },
    { label: "Agent", type: "str", val: (x) => x.agent_id },
    { label: "Test", type: "str", val: (x) => x.test_title || "", cell: (x) => x.test_id
      ? `<a data-test="${esc(x.test_id)}">${esc(x.test_title || x.test_id)}</a>` : "" },
    { label: "Status", type: "str", val: (x) => x.status, cls: (x) => scls(x.status) },
    { label: "Exit", type: "num", val: (x) => x.exit_code },
    { label: "Exit class", type: "str", val: (x) => x.exit_class || "" },
    { label: "Failover", type: "str", val: (x) => x.failover_retry ? "yes" : "" },
    { label: "Switch reason", type: "str", val: (x) => x.switch_reason || "" },
    { label: "Id", type: "str", val: (x) => x.id, cell: (x) => `<a data-agent="${esc(x.id)}">${esc(x.id)}</a>` },
  ], g.items, { filter: { label: "Status", val: (x) => x.status } });
  el.innerHTML = pageHeader("agents", "Agent invocations", DESCRIPTIONS.agents) + table;
}
let outTimer = null;
let agentOutTimer = null;

function _renderAgentDrawerBody(a, out) {
  const meta = [
    `<span class="${scls(a.status)}">${esc(a.status)}</span>`,
    a.exit_code != null ? `exit ${esc(a.exit_code)}` : "",
    a.exit_class ? esc(a.exit_class) : "",
    local(a.started_at) + (a.finished_at ? " → " + local(a.finished_at) : " → running"),
  ].filter(Boolean).join(" · ");
  let body = `<div class="muted">${meta}</div>`;
  if (a.test) {
    body += `<div style="margin-top:6px">Test: <a data-test="${esc(a.test.id)}">${esc(a.test.title || a.test.id)}</a>`
      + (a.test.spec_file ? ` <span class="muted">${esc(a.test.spec_file)}</span>` : "")
      + ` · Run: <a data-run="${esc(a.run_id)}">${esc(a.run_id)}</a></div>`;
  }
  if (a.repair_plan) {
    const planHtml = renderAgentLog(a.repair_plan.plan_text, a.agent_id, `plan:${a.id}`);
    body += `<h3>Repair plan</h3>${planHtml}`;
    if (a.repair_plan.outcome) {
      body += `<div class="muted">Outcome: ${esc(a.repair_plan.outcome)}</div>`;
    }
  }
  const running = !a.finished_at;
  const liveOutput = running && out
    ? (out.output ?? a.stdout ?? "")
    : (a.stdout || (out && out.output) || "");
  const planText = (a.repair_plan && a.repair_plan.plan_text || "").trim();
  const stdoutText = String(liveOutput || "").trim();
  const showLog = stdoutText && stdoutText !== planText;
  const logSticky = `agent:${a.id}`;
  const logLabel = running ? "Live log"
    : a.role === "implementer" ? "Implementation log"
    : a.role === "instrumenter" ? "Instrumentation plan"
    : showLog ? "Agent log" : "";
  if (showLog && logLabel) {
    body += `<h3>${logLabel}</h3>${renderAgentLog(liveOutput, a.agent_id, logSticky)}`;
  } else if (!a.repair_plan && stdoutText) {
    body += `<h3>${logLabel || "Output"}</h3>${renderAgentLog(liveOutput, a.agent_id, logSticky)}`;
  }
  if (a.stderr) body += `<h3>Stderr</h3>${renderAgentLog(a.stderr, a.agent_id, `${logSticky}:stderr`)}`;
  if (!a.repair_plan && !stdoutText && !a.stderr) {
    body += running
      ? '<div class="muted" style="margin-top:8px">Waiting for agent output…</div>'
      : '<div class="muted" style="margin-top:8px">No output recorded.</div>';
  }
  if (a.command) {
    body += `<h3>Command</h3><pre>${esc(JSON.stringify(a.command, null, 2))}</pre>`;
  }
  if (a.provider_order && a.provider_order.length) {
    body += `<div class="muted">Provider order: ${esc(a.provider_order.join(" → "))}</div>`;
  }
  if (a.stdout_path) {
    body += `<div class="muted">Log: <span class="copy" data-copy="${esc(a.stdout_path)}">${esc(a.stdout_path)} ⧉</span></div>`;
  }
  return body;
}

async function showAgent(id) {
  state.drawerRender = () => showAgent(id);
  clearTimeout(agentOutTimer);
  agentOutTimer = null;
  state.agentDrawerPolling = id;
  const myGen = ++agentDrawGen;
  const draw = async () => {
    if (myGen !== agentDrawGen) return;
    try {
      const [a, out] = await Promise.all([
        api("/agents/" + encodeURIComponent(id)),
        api("/agents/" + encodeURIComponent(id) + "/output"),
      ]);
      if (myGen !== agentDrawGen) return;
      openDrawer(`${esc(a.role)} · ${esc(a.agent_id)}`, _renderAgentDrawerBody(a, out));
      if (!a.finished_at) {
        agentOutTimer = setTimeout(draw, 1000);
      } else {
        state.agentDrawerPolling = null;
        agentOutTimer = null;
      }
    } catch (e) {
      if (myGen !== agentDrawGen) return;
      openDrawer("Agent", `<div class="destructive">Error: ${esc(e.message)}</div>`);
      state.agentDrawerPolling = null;
    }
  };
  draw();
}

// ── Commands + options forms ────────────────────────────────────────────────
async function viewCommands(el) {
  const [cmds, runs] = await Promise.all([api("/commands"), api("/command-runs")]);
  state.schemas = cmds.items;
  el.innerHTML = `<h2>Commands</h2>
    <div class="grid">${cmds.items.map((c) => `<div class="card">
      <div class="row-flex"><b>${esc(c.label)}</b>
        ${c.destructive ? '<span class="pill destructive">destructive</span>' : ""}
        ${c.long_running ? '<span class="pill">long-running</span>' : ""}</div>
      <div class="muted">e2e-ai ${esc(c.argv_prefix.join(" "))}</div>
      <div style="margin-top:8px"><button data-cmd="${esc(c.id)}">Options…</button></div>
    </div>`).join("")}</div>
    <h2 style="margin-top:14px">Monitor-launched runs</h2>
    ${renderTable("cmd-runs", [
      { label: "Started", type: "date", val: (r) => r.started_at, cell: (r) => local(r.started_at) },
      { label: "Command", type: "str", val: (r) => r.command_id },
      { label: "Status", type: "str", val: (r) => r.status, cls: (r) => scls(r.status) },
      { label: "Exit", type: "num", val: (r) => r.exit_code },
      { label: "", type: "str", val: () => "", cell: (r) => `<a data-out="${esc(r.command_run_id)}">output</a>` },
    ], runs.items, { filter: { label: "Status", val: (r) => r.status } })}`;
}

function fieldHtml(o) {
  const v = o.default;
  if (o.type === "boolean" || o.type === "toggle")
    return `<label class="field"><input type="checkbox" data-opt="${o.name}" style="width:auto"
      ${v ? "checked" : ""}/> <span class="k">${o.name}</span> — ${esc(o.help)}</label>`;
  if (o.type === "choice")
    return `<label class="field"><span class="k">${o.name}</span>
      <select data-opt="${o.name}">${o.choices.map((c) =>
        `<option ${c===v?"selected":""}>${esc(c)}</option>`).join("")}</select></label>`;
  const t = o.type === "integer" ? "number" : "text";
  const ph = o.type === "repeatable_path" ? "comma-separated paths" : "";
  return `<label class="field"><span class="k">${o.name} <span class="muted">(${o.type})</span></span>
    <input type="${t}" data-opt="${o.name}" placeholder="${ph}" value="${v==null?"":esc(v)}"/>
    <span class="muted">${esc(o.help)}</span></label>`;
}
function openOptions(id) {
  state.drawerRender = null;
  const c = state.schemas.find((x) => x.id === id);
  openDrawer("Options: " + esc(c.label),
    `<div class="muted">e2e-ai ${esc(c.argv_prefix.join(" "))}</div>
     <form id="optform">${c.options.map(fieldHtml).join("")}</form>
     <div class="row-flex" style="margin-top:10px">
       <button id="startbtn">Start</button>
       <button class="secondary" id="cancelbtn">Cancel</button>
       <span id="opterr" class="destructive"></span></div>`);
  document.getElementById("cancelbtn").onclick = closeDrawer;
  document.getElementById("startbtn").onclick = () => submitCommand(c);
}
async function submitCommand(c) {
  const btn = document.getElementById("startbtn");
  btn.disabled = true;
  const opts = {};
  c.options.forEach((o) => {
    const el = document.querySelector(`[data-opt="${o.name}"]`);
    if (!el) return;
    if (o.type === "boolean" || o.type === "toggle") opts[o.name] = el.checked;
    else if (o.type === "repeatable_path") {
      const parts = el.value.split(",").map((s) => s.trim()).filter(Boolean);
      if (parts.length) opts[o.name] = parts;
    } else if (el.value !== "") opts[o.name] = o.type === "integer" ? Number(el.value) : el.value;
  });
  try {
    const res = await api(`/commands/${encodeURIComponent(c.id)}/runs`,
      { method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ options: opts }) });
    // Transition the same drawer straight to the output view (no close +
    // full-page re-render + delay, which briefly flashed the Commands page).
    state.view = "commands";
    showOutput(res.command_run_id);
  } catch (e) {
    document.getElementById("opterr").textContent = e.message;
    btn.disabled = false;
  }
}
async function showOutput(id) {
  state.drawerRender = null;
  state.agentDrawerPolling = null;
  clearTimeout(outTimer);
  outTimer = null;
  const myGen = ++commandDrawGen;
  const draw = async () => {
    if (myGen !== commandDrawGen) return;
    const [r, out] = await Promise.all([
      api("/command-runs/" + encodeURIComponent(id)),
      api("/command-runs/" + encodeURIComponent(id) + "/output"),
    ]);
    if (myGen !== commandDrawGen) return;
    openDrawer("Command run " + esc(id),
      `<div class="muted">${esc(r.command_id)} · <span class="${scls(r.status)}">${esc(r.status)}</span>
        · exit ${esc(r.exit_code ?? "—")}</div>${
        renderAgentLog(out.output || "(no output yet)", null, `cmd:${id}`)}`);
    if (r.status === "running") outTimer = setTimeout(draw, 1000);
  };
  draw();
}

async function viewSettings(el) {
  const i = state.info || {};
  const simplified = `<div class="card">
    <div><b>Project:</b> ${esc(i.project_id) || '<span class="muted">(none)</span>'}</div>
    <div><b>Project root:</b> <span class="copy" data-copy="${esc(i.project_root)}">${esc(i.project_root)} ⧉</span></div>
    <div><b>State DB:</b> <span class="copy" data-copy="${esc(i.db_path)}">${esc(i.db_path)} ⧉</span></div>
    <div><b>Bind:</b> ${esc(i.host)}:${esc(i.port)}</div>
    <div><b>Refresh:</b> ${esc(i.refresh_ms)} ms</div>
    <div class="muted" style="margin-top:8px">Read-only monitor. Database access is never written.</div>
  </div>`;

  let full = "";
  if (state.settingsFull) {
    let cfg = null;
    try { cfg = (await api("/config")).config; } catch (e) { /* handled below */ }
    full = cfg
      ? `<h3>Effective configuration <span class="muted">(defaults + user + project)</span></h3>
         <div class="card cfg">${renderConfig(cfg)}</div>`
      : '<div class="card muted">Full config unavailable — no project config was resolvable (e.g. started with only --db).</div>';
  }

  el.innerHTML = pageHeader("settings", "Settings", DESCRIPTIONS.settings) + `
    <label class="row-flex" style="gap:8px; margin:4px 0 10px; cursor:pointer">
      <input type="checkbox" id="settings-full" style="width:auto" ${state.settingsFull ? "checked" : ""}/>
      <span>Show all settings (everything, including defaults and user config)</span>
    </label>` + simplified + full;

  const toggle = document.getElementById("settings-full");
  if (toggle) toggle.onchange = (e) => { state.settingsFull = e.target.checked; render(false); };
}

// ── drawer ──────────────────────────────────────────────────────────────────
function openDrawer(title, html) {
  let d = document.getElementById("drawer");
  if (!d) {
    d = document.createElement("div"); d.id = "drawer";
    d.style = "position:fixed;top:0;right:0;width:min(680px,90vw);height:100vh;background:var(--panel);border-left:1px solid var(--border);overflow:auto;padding:16px;z-index:20;box-shadow:-8px 0 24px #0008";
    document.body.appendChild(d);
  }
  d.innerHTML = `<div class="row-flex"><h2 style="flex:1">${title}</h2>
    <button class="secondary" onclick="closeDrawer()">Close</button></div>${html}`;
}
function dismissDrawer() {
  const d = document.getElementById("drawer");
  if (d) d.remove();
  clearTimeout(outTimer);
  clearTimeout(agentOutTimer);
  outTimer = null;
  agentOutTimer = null;
  agentDrawGen += 1;
  commandDrawGen += 1;
  state.agentDrawerPolling = null;
  state.drawerRender = null;
}
function closeDrawer() {
  dismissDrawer();
  render(false);  // refresh the underlying view (e.g. show the new command run)
}

// ── event delegation: sorting, filtering, row actions ────────────────────────
// Tables are rebuilt on every render, so handlers are delegated from document
// rather than re-attached each time.
document.addEventListener("click", (e) => {
  const th = e.target.closest("th[data-sort]");
  if (th) {
    const [id, iStr] = th.dataset.sort.split(":");
    const i = Number(iStr);
    const cur = state.sort[id];
    state.sort[id] = { i, dir: cur && cur.i === i && cur.dir === "asc" ? "desc" : "asc" };
    if (th.closest("#drawer") && state.drawerRender) state.drawerRender();
    else render(false);
    return;
  }
  const info = e.target.closest("[data-info]");
  if (info) {
    const v = info.dataset.info;
    state.descOpen[v] = !state.descOpen[v];
    // Toggle in place so the reveal/collapse animates; state persists re-renders.
    const desc = document.getElementById("desc-" + v);
    if (desc) desc.classList.toggle("open", state.descOpen[v]);
    info.classList.toggle("rotated", state.descOpen[v]);
    return;
  }
  const a = e.target.closest("[data-run],[data-test],[data-fail],[data-out],[data-cmd],[data-copy],[data-agent]");
  if (!a) return;
  const d = a.dataset;
  if (d.run !== undefined) showRun(d.run);
  else if (d.test !== undefined) showTest(d.test);
  else if (d.fail !== undefined) showFailure(d.fail);
  else if (d.out !== undefined) showOutput(d.out);
  else if (d.cmd !== undefined) openOptions(d.cmd);
  else if (d.agent !== undefined) showAgent(d.agent);
  else if (d.copy !== undefined) navigator.clipboard?.writeText(d.copy);
});
document.addEventListener("change", (e) => {
  const sel = e.target.closest("select[data-filter]");
  if (!sel) return;
  state.filter[sel.dataset.filter] = sel.value;
  if (sel.closest("#drawer") && state.drawerRender) state.drawerRender();
  else render(false);
});

const VIEWS = { active: viewActive, commands: viewCommands, runs: viewRuns, tests: viewTests,
                failures: viewFailures, agents: viewAgents, settings: viewSettings };
// showLoading: show a placeholder (manual navigation / first load). Auto-refresh
// passes false so the current content stays put and is swapped only at the end —
// no per-second blank flash.
async function render(showLoading = true) {
  renderNav();
  const el = document.getElementById("view");
  if (showLoading) el.innerHTML = '<div class="muted">Loading…</div>';
  try { await VIEWS[state.view](el); }
  catch (e) { el.innerHTML = `<div class="card destructive">Error: ${esc(e.message)}</div>`; }
}

// Poll the state revision; only re-render when it actually changes, so an idle
// dashboard does not flicker every second. Commands is refreshed whenever a
// monitor-launched command is still running (its status lives outside SQLite).
async function tick() {
  let summary;
  try { summary = await api("/summary"); } catch { return; }
  const rev = summary.revision;
  let live = false;
  if (state.view === "commands") {
    try { live = (await api("/command-runs")).items.some((r) => r.status === "running"); }
    catch { live = false; }
  }
  const activeAgents = Number(summary.active_agents || 0);
  if (activeAgents > 0) live = true;
  if (rev === state.rev && !live) return;
  state.rev = rev;
  render(false);
  if (document.getElementById("drawer") && state.drawerRender && !state.agentDrawerPolling) {
    state.drawerRender();
  }
}

async function boot() {
  document.getElementById("toggle").onclick = () => {
    const s = document.getElementById("side"); s.classList.toggle("collapsed");
    localStorage.setItem("sideCollapsed", s.classList.contains("collapsed"));
  };
  if (localStorage.getItem("sideCollapsed") === "true")
    document.getElementById("side").classList.add("collapsed");
  try {
    const h = await api("/health");
    state.info = h.monitor;
    document.getElementById("project").textContent = h.monitor.project_id || "(no project)";
    document.getElementById("dbpath").textContent = h.monitor.db_path;
    document.getElementById("conn").style.background = h.ok ? "var(--ok)" : "var(--warn)";
    document.getElementById("conn").title = h.message;
  } catch (e) { document.getElementById("conn").style.background = "var(--fail)"; }
  try { state.rev = (await api("/summary")).revision; } catch { state.rev = ""; }
  state.view = viewFromHash();
  // Reflect the initial view in the URL without triggering a second render.
  if (location.hash.slice(1) !== state.view)
    history.replaceState(null, "", "#" + state.view);
  render();
  const ms = (state.info && state.info.refresh_ms) || 1000;
  setInterval(tick, Math.max(500, ms));
}
boot();
</script>
