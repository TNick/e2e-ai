repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check src tests
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format --check src tests
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
