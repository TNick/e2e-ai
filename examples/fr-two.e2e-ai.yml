# fr-two reference configuration for e2e-ai.
#
# This file is the reference config for target projects: every option is
# documented. e2e-ai is the E2E control plane (discovery, execution state,
# leases, failure packets, agent routing, repair, verification); the fr-two
# adapter owns project-specific details (app stack, storage wipe, database
# slots, failure families).

# Project identity used in local state, test ids, database slots, and reports.
project:
  id: fr-two

# Runtime state is local and ignored by source control.
state:
  dir: .e2e-ai

# Repair agents may edit frontend and backend in this full-stack project.
target:
  scope: full_stack
  surfaces:
    frontend:
      path: .
      editable: true
      role: source
    backend:
      path: backend
      editable: true
      role: source

# Playwright commands stay project-specific, but e2e-ai owns orchestration.
playwright:
  cwd: e2e
  list_command:
    - pnpm
    - exec
    - playwright
    - test
    - --list
  run_command:
    - pnpm
    - exec
    - playwright
    - test
  report_env:
    json: PLAYWRIGHT_JSON_OUTPUT_NAME   # e2e-ai points this at a per-attempt file
    blob: PLAYWRIGHT_BLOB_OUTPUT_FILE
  base_url_env: PLAYWRIGHT_BASE_URL     # frontend URL for the leased slot
  api_base_env: PLAYWRIGHT_API_BASE     # backend API URL for the leased slot
  lab_flag_env: E2E_LAB_COMPOSE         # flags the full lab compose stack

# Diagnostic specs stay in the tree but are excluded from normal repair runs.
# Exclude patterns are regular expressions (search) over selector/file/title/id.
exclude:
  tests:
    - "tests/_diag-.*\\.spec\\.ts"

# e2e-ai starts the Docker app stack before running tests. fr-two still owns
# the compose files and service definitions; e2e-ai owns lifecycle orchestration.
target_runtime:
  backend: docker_compose
  cwd: docker
  project_name: fr-two-e2e
  compose_files:
    - compose.yml
  env_files:
    - env.docker
  profiles:
    - bundled-postgres
    - seed-data
    - map-cache
    - http-cache
  env:
    COMPOSE_PROFILES: bundled-postgres,seed-data,map-cache,http-cache
    FRTWO_MAP_CACHE_ENABLED: "true"
    FRTWO_MAP_CACHE_URL: http://mapproxy:8080
    FRTWO_RESI_QGIS_RENDER_ENABLED: "true"
    E2E_LAB_COMPOSE: "1"
  start:
    detach: true
    remove_orphans: true
    wait: true
    timeout_seconds: 240
  health_checks:
    - name: backend
      kind: http
      url: http://127.0.0.1:8000/api/health
      timeout_seconds: 90
    - name: frontend
      kind: http
      url: http://127.0.0.1:8080/
      timeout_seconds: 90
    - name: postgres
      kind: tcp
      host: 127.0.0.1
      port: 5432
      timeout_seconds: 90
  stop:
    policy: never

# fr-two owns app-stack details; e2e-ai owns leases and reset orchestration.
# The `fr_two` backend uses stable execution slots: the database name and user
# stay fixed per slot. Before a slot is reused its database is restored from a
# prebuilt baseline and its file/object storage is wiped clean.
isolation:
  backend: fr_two
  keep_on_failure: true    # keep a failed slot's env for debugging
  keep_on_success: false   # wipe a passing slot so it is clean for reuse
  slots:
    count: 4                       # number of stable execution slots
    database_prefix: frtwo_e2e_slot  # slot i -> database `frtwo_e2e_slot{i}`
    database_user: frtwo             # stable DB user shared by all slots
    shared_app_stack: true           # one Docker lab stack; slots differ by id/storage
    backend_port: 8000
    frontend_port: 8080
    shared_database_name: frtwo
  storage:
    wipe_before_attempt: true  # reset file/object storage before each attempt
    targets:
      # `{slot_id}` expands to the slot (e.g. `slot0`). Directory targets are
      # emptied; the minio target is cleared by prefix.
      - kind: directory
        name: uploads
        path: playground/e2e/slots/{slot_id}/uploads
      - kind: directory
        name: backend-data
        path: playground/e2e/slots/{slot_id}/backend-data
      - kind: directory
        name: map-renderer
        path: playground/e2e/slots/{slot_id}/map-renderer
      - kind: directory
        name: mapproxy-cache
        path: playground/e2e/slots/{slot_id}/mapproxy-cache
      - kind: minio
        name: lab-bucket
        bucket: frtwo-lab
        prefix: e2e/{slot_id}/

# The final gate uses the same e2e-ai orchestrator, not old script logic.
full_verification:
  command:
    - e2e-ai
    - verify

# Role -> agent plugin (+ profile). A stronger planner/instrumenter with a
# cheaper implementer keeps token spend modest while planning stays capable.
agents:
  planner:
    plugin: codex
    profile: difficult
  implementer:
    plugin: codex
    profile: normal
  instrumenter:
    plugin: codex
    profile: difficult
