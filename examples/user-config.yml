agents:
  codex:
    enabled: true
    executable: codex
  claude:
    enabled: true
    executable: claude
  cursor:
    enabled: true
    executable: agent

routing:
  allow_canary: false
  long_task_min_remaining_percent: 25
  role_preferences:
    planner: [codex, claude, cursor]
    implementer: [claude, codex, cursor]
    instrumenter: [cursor, claude, codex]
  failover:
    enabled: true
    max_switches_per_test: 6
